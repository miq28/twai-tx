[env:weact-studio-can485-v1]
board = esp32dev
platform = ${common.platform}
framework = ${common.framework}

; board_build.partitions = huge_app.csv

; 1. Double the flash clock and use all 4 data lines
board_build.f_flash = 80000000L
board_build.flash_mode = qio

; 2. Ensure CPU is at max (240MHz) immediately
board_build.f_cpu = 240000000L

; 3. Optimization flags
board_build.partitions = weact_8mb_ota.csv
build_unflags = ${common.build_unflags}
build_flags =
    ${common.build_flags}
    -DWEACT_STUDIO_CAN485_V1
    ; -D CONFIG_FREERTOS_CHECK_STACKOVERFLOW=2

lib_ldf_mode = ${common.lib_ldf_mode}
lib_compat_mode = ${common.lib_compat_mode}

extra_scripts = ${common.extra_scripts}

; build_type = ${common.build_type} 

; ===== libs =====
lib_deps =
    ${common.lib_deps}
    adafruit/Adafruit NeoPixel @ ^1.12.0

; ===== Upload / Monitor =====
monitor_speed = ${common.monitor_speed}
; upload_speed = ${common.}

; ===== Stability =====
build_type = ${common.build_type} 
monitor_filters = ${common.monitor_filters}

