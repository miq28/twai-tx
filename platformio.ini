[platformio]
default_envs = waveshare-esp32-s3-rs485-can

; custom common options
[common]
platform = file://./platforms/espressif32-55.03.37
framework =arduino
build_unflags = -Os
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -D CONFIG_CAN_AUTO_RECOVER=1    ; Useful for CAN bus bus-off recovery
    -O2
    -pipe
    -D CONFIG_ASYNC_TCP_MAX_ACK_TIME=5000 ; (keep default)
    -D CONFIG_ASYNC_TCP_PRIORITY=10 ; (keep default)
    -D CONFIG_ASYNC_TCP_QUEUE_SIZE=64 ; (keep default)
    -D CONFIG_ASYNC_TCP_RUNNING_CORE=1 ; force async_tcp task to be on same core as the app (default is core 0)
    -D CONFIG_ASYNC_TCP_STACK_SIZE=4096 ; reduce the stack size (default is 16K)

; ---- LINKER / LIB ----
lib_ldf_mode = chain
lib_compat_mode = strict ; soft

extra_scripts = pre:ccache.py

build_type = debug 

; ===== libs =====
lib_deps =
    ESP32Async/AsyncTCP@^3.4.10
    ESP32Async/ESPAsyncWebServer@^3.10.3
    ayushsharma82/WebSerial@^2.1.2

; ===== Upload / Monitor =====
monitor_speed = 1000000
; upload_speed = 921600

; ===== Stability =====
monitor_filters = esp32_exception_decoder

[env:waveshare-esp32-s3-rs485-can]
board = esp32-s3-devkitc-1
platform = ${common.platform}
framework = ${common.framework}
build_unflags = ${common.build_unflags}
build_flags =
    ${common.build_flags}
    -DWAVESHARE_ESP32_S3_RS485_CAN
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_ldf_mode = ${common.lib_ldf_mode}
lib_compat_mode = ${common.lib_compat_mode}

extra_scripts = ${common.extra_scripts}

; build_type = ${common.build_type} 

; ===== libs =====
lib_deps = ${common.lib_deps}

; ===== Upload / Monitor =====
monitor_speed = ${common.monitor_speed}
; upload_speed = ${common.}

; ===== Stability =====
monitor_filters = ${common.monitor_filters}

; ===== Flash fix =====
; board_upload.flash_size = 16MB
; board_build.partitions = default_16MB.csv

; monitor_port = COM3
; upload_port = COM3




