<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CAN Viewer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
    <button onclick="setMode()">Apply</button>

    <select id="modeSel">
        <option value="0">Generator</option>
        <option value="1">Slow</option>
        <option value="2">ECU</option>
        <option value="3">Analyzer</option>
        <option value="4">SavvyCAN</option>
        <option value="5">ELM327</option>
    </select>

    <button onclick="togglePause()">Pause</button>
    <input id="filterInput" placeholder="Filter ID (hex)">
    <span id="fps"></span>
    <span id="wsstat"></span>
</div>

<h3>CAN Live</h3>

<table id="t">
<thead>
<tr>
    <th>ID</th>
    <th>DLC</th>
    <th>DATA</th>
    <th>COUNT</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script src="app.js"></script>
</body>
</html>
