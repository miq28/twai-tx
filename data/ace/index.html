<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>CAN Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="controls">
    ID: <input id="filterId" placeholder="e.g. 0x100">
    MASK: <input id="filterMask" placeholder="e.g. 0x700">

    <button id="pauseBtn">Pause Capture</button>
    <button id="freezeBtn">Freeze View</button>
    <button id="clearBtn">Clear</button>

    <button id="modeBtn">Mode: Stream</button>
    <button id="collapseBtn">Collapse: OFF</button>
    <button id="exportBtn">Export CSV</button>
    <button id="themeBtn">Theme</button>

    Zoom: <input id="zoom" type="range" min="10" max="18" value="14">
    Scroll: <input id="scroll" type="range" min="0" max="0" value="0">

    <span id="status">Disconnected</span>
    <span id="fps">FPS: 0</span>
    <span id="total">Total: 0</span>
</div>

<canvas id="canvas"></canvas>

<script src="app.js"></script>
</body>
</html>
